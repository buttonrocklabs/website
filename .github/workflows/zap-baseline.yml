# LAB-113: ZAP baseline DAST against the BRL marketing site.
# Manually triggered (workflow_dispatch only). The HANDBOOK §19 cadence
# is "one-shot when something major changes" — this workflow makes that
# one-shot cheap to repeat. Findings auto-file as a GitHub Issue.

name: ZAP baseline DAST

on:
  workflow_dispatch:
    inputs:
      target:
        description: "URL to scan (default: production)"
        required: false
        default: "https://buttonrocklabs.com"

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target }}
          # Allow the job to "fail" with findings without failing the
          # workflow run — we want the issue auto-filed even when there
          # are warnings.
          allow_issue_writing: true
          fail_action: false
          artifact_name: zap-baseline-${{ github.run_id }}
