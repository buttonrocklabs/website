# LAB-76: Dependabot — weekly npm + GitHub Actions updates.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      patches:
        update-types:
          - patch
      # LAB-118: vite + its plugins must upgrade together — plugin-react N
      # declares vite ^N as a peer, so split majors fail to install. Group
      # them so the next major bump arrives as a single PR.
      vite-toolchain:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/vite"
        update-types:
          - minor
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
